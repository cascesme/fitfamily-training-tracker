services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fitfamily_test
      POSTGRES_USER: fitfamily
      POSTGRES_PASSWORD: fitfamily
    ports:
      - "5433:5432"
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitfamily -d fitfamily_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://fitfamily:fitfamily@db:5432/fitfamily_test
      MEDIA_PATH: /data/media
      NODE_ENV: production
    volumes:
      - test_media:/data/media
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

volumes:
  test_media:

networks:
  internal:
