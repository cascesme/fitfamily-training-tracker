services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fitfamily
      POSTGRES_USER: fitfamily
      POSTGRES_PASSWORD: fitfamily
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitfamily -d fitfamily"]
      interval: 5s
      timeout: 5s
      retries: 10  
    volumes:
      - ./db:/var/lib/postgresql/data

  fit-family-app:
    image: ghcr.io/cascesme/fitfamily-training-tracker:1.0.0
    environment:
      DATABASE_URL: postgresql://fitfamily:fitfamily@db:5432/fitfamily
      MEDIA_PATH: /data/media
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    volumes:
      - ./media:/data/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - npm
      - default

networks:
  npm:
    external: true    